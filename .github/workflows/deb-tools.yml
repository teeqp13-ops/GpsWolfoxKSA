name: DEB Tools

on:
  workflow_dispatch:
  push:
    paths:
      - 'debs/**'
      - 'scripts/**'
      - '.github/workflows/deb-tools.yml'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Extract deb files
        run: |
          mkdir -p out
          shopt -s nullglob
          for deb in debs/*.deb; do
            name="$(basename "$deb" .deb)"
            bash scripts/extract_deb.sh "$deb" "out/$name"
          done
          if [ -z "$(find out -mindepth 1 -maxdepth 1 -type d 2>/dev/null)" ]; then
            echo "No deb files found in debs/. Add a .deb file and run again." > out/README.txt
          fi

      - name: Upload extracted output
        uses: actions/upload-artifact@v4
        with:
          name: deb-extracted-output
          path: out/