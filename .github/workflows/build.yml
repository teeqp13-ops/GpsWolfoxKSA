name: Build GPS Plus Tweak

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build DEB Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Build package
        run: |
          make clean || true
          make package FINALPACKAGE=1

      - name: List built packages
        run: |
          echo "Built DEB files:"
          find packages .theos/packages -type f -name "*.deb" 2>/dev/null || true

      - name: Upload DEB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GPSPlus-DEB-Packages
          path: |
            packages/*.deb
            .theos/packages/*.deb
          if-no-files-found: error
          retention-days: 30
