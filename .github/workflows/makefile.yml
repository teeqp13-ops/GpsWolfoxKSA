name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        mkdir -p /opt/theos
        git clone --recursive https://github.com/theos/theos.git /opt/theos
        /opt/theos/bin/update-theos
      env:
        THEOS: /opt/theos

    - name: Download iOS SDK
      run: |
        mkdir -p /opt/theos/sdks
        curl -L https://github.com/theos/sdks/releases/download/latest/iPhoneOS13.sdk.tar.gz -o iPhoneOS13.sdk.tar.gz
        tar -xzf iPhoneOS13.sdk.tar.gz -C /opt/theos/sdks/
        rm iPhoneOS13.sdk.tar.gz
      env:
        THEOS: /opt/theos

    - name: Install dependencies
      run: make
      env:
        THEOS: /opt/theos

    - name: Run check
      run: make check
      env:
        THEOS: /opt/theos

    - name: Run distcheck
      run: make distcheck
      env:
        THEOS: /opt/theos

